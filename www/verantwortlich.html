<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressum</title>

    <style>
        /* Reset default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Base layout */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;

            /* Blue background */
            background: #00a2ff;

            /* Pixel-style font */
            font-family: "Courier New", monospace;

            color: #ffffff;
            overflow: hidden;

            /* Make rendering more pixel-like */
            image-rendering: pixelated;
        }

        /* Background container */
        .background {
            position: fixed;
            inset: 0;
            z-index: -1;
            filter: blur(30px);
        }

        /* Pixel-style blobs */
        .blob {
            position: absolute;
            width: 270px;
            height: 270px;

            /* Square shapes for pixel look */
            border-radius: 80px;

            opacity: 0.7;

            /* Faster stepped animation */
            animation: move 4s infinite alternate;
        }

        .blob.one {
            background: #34f79c;
            top: 10%;
            left: 10%;
        }

        .blob.two {
            background: #bbf125;
            bottom: 40%;
            right: 15%;
            animation-delay: 1.361s;
        }

        .blob.three {
            background: #f1bc29;
            top: 60%;
            left: 20%;
            animation-delay: 2.85s;
        }

        /* Movement animation */
        @keyframes move {
            from {
                transform: translate(0, 0) scale(1);
            }
            to {
                transform: translate(120px, -89px) scale(1.15);
            }
        }

        /* Impressum box */
        .impressum-box {
            background: #77ebfa;

            /* Light blue-gray border */
            border: 4px solid #8fbcd4;

            /* Pixel-style corners */
            border-radius: 4px;

            padding: 28px 32px;

            max-width: 420px;
            width: 90%;

            text-align: center;

            /* Hard shadow for retro look */
            box-shadow: 8px 8px 0 #4b6f88;

            color: #08304f;
        }

        /* Headline */
        .impressum-box h1 {
            font-size: 1.3rem;
            margin-bottom: 18px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        /* Text */
        .impressum-box p {
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        /* Links */
        .impressum-box a {
            color: #005fa3;
            text-decoration: none;
        }

        .impressum-box a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- Animated pixel background -->
    <div class="background">
        <div class="blob one"></div>
        <div class="blob two"></div>
        <div class="blob three"></div>
    </div>

    <!-- Impressum box -->
    <div class="impressum-box">

        <h1>IMPRESSUM</h1>

        <p>
            {{impressum-description}}<br>
            {{impressum-address}} {{impressum-city}}<br>
            {{impressum-timeframe}}
        </p>

        <p>
            Verantwortlich: {{impressum-responsible-person}}<br>
            E-Mail: <a href="mailto:{{impressum-contact-email}}">{{impressum-contact-email}}</a>
        </p>

    </div>

</body>
</html>
