		var canv = document.getElementById("canv");
		var dpr = window.devicePixelRatio || 1;
		canv.width = canv.getBoundingClientRect().width * dpr;
		canv.height = canv.getBoundingClientRect().height * dpr;
		var fenster = document.getElementById("fenster");

		var glob = {};
		var schleife = false;//--Schleife--
		var aktiv = true;
		var maus = {x:0,y:0};
		var neu = true;
		var startzeit = (new Date()).getTime() / 1000;
		var zeit;
		document.onmousemove = mausmove; 
		function mausmove(e){
			var rect = canv.getBoundingClientRect();
			maus.x = e.clientX - rect.left;
			maus.y = e.clientY - rect.top;
		}
		var tasten = [];
		document.onkeydown = keydown;
		function keydown(e){
			var pos = tasten.indexOf(e.key);
			if(pos < 0)
				tasten.push(e.key);
		}
		document.onkeyup = keyup;
		function keyup(e){
			var pos = tasten.indexOf(e.key);
			if(pos >= 0)
				tasten.splice(pos, 1);
		}
		function itera(){
			zeit = (new Date()).getTime() / 1000 - startzeit;
			func();
			if(schleife && aktiv)
				requestAnimationFrame(itera);
			neu = false;
		}
		itera();
	</script>
